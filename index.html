<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Crusaders - Final Showdown</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            border: 4px solid #444;
            background: #000;
            max-width: 1280px;
            width: 100%;
            height: auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 1280;
        const HEIGHT = 720;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        const CENTER = { x: WIDTH / 2, y: HEIGHT / 2 };

        // --- AUTO-SAVE SYSTEM ---
        // Checks if 'crusaders_progress' exists in the browser's memory.
        // If it doesn't, it starts at Stage 1.
        let unlockedStages = localStorage.getItem('crusaders_progress') ? 
                             parseInt(localStorage.getItem('crusaders_progress')) : 1;

        function saveGame() {
            localStorage.setItem('crusaders_progress', unlockedStages);
        }

        // --- LOADING SYSTEM ---
        let assetsLoaded = false;
        let totalAssets = 0;
        let loadedCount = 0;
        const images = {};

        function loadImg(key, src) {
            totalAssets++;
            const img = new Image();
            img.src = src;
            img.onload = () => {
                loadedCount++;
                if (loadedCount === totalAssets) assetsLoaded = true;
            };
            images[key] = img;
            return img;
        }

        // --- ASSETS ---
        const loadingImg = loadImg('loading', 'loading.png'); 
        const mapImg = loadImg('map', 'Stage Map.jpg');
        const boatImg = loadImg('boat', 'boat.png');
        const fishImg = loadImg('fish', 'fih.png');
        const forestBg = loadImg('forestBg', 'forestbg.png');
        const lumberjackImg = loadImg('lumberjack', 'lumberjack.png');
        const plantImg = loadImg('plant', 'plant.png');
        const semiTreeImg = loadImg('semiTree', 'semi-tree.png');
        const treeImg = loadImg('tree', 'tree.png');
        const boatGuyImg = loadImg('boatGuy', 'boatguy.png');
        const riverBg = loadImg('riverBg', 'stillwater.png');
        const backunawaImg = loadImg('backunawa', 'backunawa.png');
        const boatkunawaImg = loadImg('boatkunawa', 'boatkunawa.png');
        const shipImg = loadImg('ship', 'ship.png');
        const tntImg = loadImg('tnt', 'tnt.png');
        const explodeImg = loadImg('explode', 'explode.png');
        const payrImg = loadImg('payr', 'payr.png');

        const trashSpriteNames = ['newspaper.png', 'plasticbag.png', 'apple.png', 'banana.png', 'can.png'];
        const trashSprites = trashSpriteNames.map((src, i) => loadImg('trash' + i, src));
        const s3BgNames = ['wf1.png', 'wf2.png', 'wf3.png'];
        const s3Bgs = s3BgNames.map((src, i) => loadImg('wf' + i, src));
        const frameNames = ['bg_healthy.png', 'bg_medium.png', 'bg_wilted.png'];
        const bgFrames = frameNames.map((src, i) => loadImg('bgFrame' + i, src));

        // --- QUESTIONS ---
        const questionsBank = [
            { q: "Plastic waste can take hundreds of years to decompose.", a: ["True", "False"], correct: 0 },
            { q: "Which gas is mainly responsible for global warming?", a: ["Oxygen", "Carbon Dioxide", "Nitrogen"], correct: 1 },
            { q: "Turning off unused lights saves energy.", a: ["True", "False"], correct: 0 },
            { q: "Which material is non-biodegradable?", a: ["Paper", "Plastic", "Leaves"], correct: 1 },
            { q: "Oil spills harm marine life.", a: ["True", "False"], correct: 0 },
            { q: "Which practice helps reduce air pollution?", a: ["Using public transport", "Burning trash", "Cutting trees"], correct: 0 },
            { q: "Noise pollution can affect human health.", a: ["True", "False"], correct: 0 },
            { q: "Which pollution affects rivers and lakes?", a: ["Air", "Water", "Noise"], correct: 1 },
            { q: "Trees absorb carbon dioxide.", a: ["True", "False"], correct: 0 },
            { q: "Which energy source is renewable?", a: ["Coal", "Solar", "Oil"], correct: 1 },
            { q: "Burning fossil fuels contributes to climate change.", a: ["True", "False"], correct: 0 },
            { q: "Which waste is biodegradable?", a: ["Banana peel", "Glass", "Plastic"], correct: 0 },
            { q: "Smog is made of smoke and fog.", a: ["True", "False"], correct: 0 },
            { q: "Which gas causes acid rain?", a: ["Sulfur Dioxide", "Oxygen", "Hydrogen"], correct: 0 },
            { q: "Recycling reduces landfill waste.", a: ["True", "False"], correct: 0 },
            { q: "Which action saves water?", a: ["Fixing leaks", "Leaving taps open", "Over-irrigation"], correct: 0 },
            { q: "Plastic bags are eco-friendly.", a: ["True", "False"], correct: 1 },
            { q: "Which pollution affects night sky visibility?", a: ["Light", "Noise", "Soil"], correct: 0 },
            { q: "Deforestation increases carbon dioxide levels.", a: ["True", "False"], correct: 0 },
            { q: "Which sector produces most greenhouse gases?", a: ["Energy", "Education", "Tourism"], correct: 0 },
            { q: "Which material can be recycled indefinitely?", a: ["Paper", "Glass", "Plastic"], correct: 1 },
            { q: "Overfishing harms marine ecosystems.", a: ["True", "False"], correct: 0 },
            { q: "Which pollution affects hearing?", a: ["Water", "Noise", "Air"], correct: 1 },
            { q: "Using cloth bags helps the environment.", a: ["True", "False"], correct: 0 },
            { q: "Which causes soil pollution?", a: ["Chemical pesticides", "Compost", "Earthworms"], correct: 0 },
            { q: "Wetlands help filter pollutants.", a: ["True", "False"], correct: 0 },
            { q: "Which gas is released by vehicles?", a: ["Oxygen", "Carbon Monoxide", "Helium"], correct: 1 },
            { q: "Climate change causes rising sea levels.", a: ["True", "False"], correct: 0 },
            { q: "Which waste takes longest to decompose?", a: ["Plastic", "Paper", "Food waste"], correct: 0 },
            { q: "Littering causes land pollution.", a: ["True", "False"], correct: 0 },
            { q: "Which activity causes noise pollution?", a: ["Traffic", "Tree planting", "Rain"], correct: 0 },
            { q: "Water pollution can spread diseases.", a: ["True", "False"], correct: 0 },
            { q: "Which fuel is the cleanest?", a: ["Coal", "Natural gas", "Wood"], correct: 1 },
            { q: "Greenhouse gases trap heat in the atmosphere.", a: ["True", "False"], correct: 0 },
            { q: "Which harms coral reefs?", a: ["Oil spills", "Clean water", "Sand"], correct: 0 },
            { q: "Which practice is sustainable?", a: ["Reforestation", "Illegal logging", "Overfishing"], correct: 0 },
            { q: "Air pollution improves lung health.", a: ["True", "False"], correct: 1 },
            { q: "Which causes groundwater contamination?", a: ["Chemical waste", "Rain", "Tree roots"], correct: 0 },
            { q: "Noise pollution affects sleep.", a: ["True", "False"], correct: 0 },
            { q: "Which action reduces plastic pollution?", a: ["Reusable containers", "Buying more plastic", "Burning plastic"], correct: 0 },
            { q: "Soil pollution affects food production.", a: ["True", "False"], correct: 0 },
            { q: "Which pollution affects plants in water?", a: ["Water pollution", "Noise pollution", "Light pollution"], correct: 0 },
            { q: "Using renewable energy reduces pollution.", a: ["True", "False"], correct: 0 },
            { q: "Which human activity pollutes rivers?", a: ["Washing clothes in rivers", "Tree planting", "Rainfall"], correct: 0 },
            { q: "Pollution has no effect on biodiversity.", a: ["True", "False"], correct: 1 },
            { q: "Which helps conserve natural resources?", a: ["Recycling", "Dumping waste", "Littering"], correct: 0 },
            { q: "Acid rain damages crops.", a: ["True", "False"], correct: 0 },
            { q: "Which is a source of water pollution?", a: ["Industrial waste", "Clean rain", "Fresh springs"], correct: 0 },
            { q: "Turning appliances off saves energy.", a: ["True", "False"], correct: 0 },
            { q: "Which material is biodegradable?", a: ["Food waste", "Glass", "Metal"], correct: 0 },
            { q: "Deforestation causes soil erosion.", a: ["True", "False"], correct: 0 },
            { q: "Which pollution is caused by excessive lights?", a: ["Light pollution", "Noise pollution", "Soil pollution"], correct: 0 },
            { q: "Marine pollution is mostly caused by humans.", a: ["True", "False"], correct: 0 },
            { q: "Which action protects the environment?", a: ["Planting trees", "Burning waste", "Overfishing"], correct: 0 },
            { q: "Which gas damages the ozone layer?", a: ["CFCs", "Oxygen", "Nitrogen"], correct: 0 },
            { q: "Climate change affects weather patterns.", a: ["True", "False"], correct: 0 },
            { q: "Which pollution affects visibility?", a: ["Air pollution", "Noise pollution", "Soil pollution"], correct: 0 },
            { q: "Proper waste management reduces pollution.", a: ["True", "False"], correct: 0 },
            { q: "Which activity increases waste generation?", a: ["Consumerism", "Recycling", "Composting"], correct: 0 },
            { q: "Sustainable development protects future needs.", a: ["True", "False"], correct: 0 }
        ];

        // --- GLOBAL STATE ---
        let currentScene = 'LOADING'; 
        let score, health, seedHP, timeLeft, frameCount, gameOver, gameWon, lastTime = 0;

        // --- STAGE VARS ---
        const V_WIDTH = 640;
        const V_HEIGHT = 360;
        let framesLoaded = 3; 
        let currentFrame = 0, bgTimer = 0, trashList = [], spawnTimer = 0, quizTimer = 0, currentQ = null;
        let activeQuestions = [];
        let lumberjacks = [];
        const spawnAngles = [90, 45, 135, 270, 315, 225];
        let shieldAngle = 0, targetShieldAngle = 0;
        const joystick = { baseX: 250, baseY: HEIGHT - 150, currX: 250, currY: HEIGHT - 150, radius: 80, knobRadius: 40, active: false };

        const S3_W = 400;
        const S3_H = 300;
        let hookLength = 0, hookState = "idle", stunTimer = 0, shakeAmount = 0, fishHiddenTimer = 0;
        let s3Trash = [], s3Fish = [];

        const s4LanesY = [160, 360, 560];
        const s4Borders = [280, 440];
        const s5LanesX = [160, 480, 800, 1120];
        let playerLane = 1, dynamites = [], explosions = [], bossTimer = 30, spawnCooldown = 0;
        let bossHP = 100, turnQueue = 0, waitingForQuiz = true, fireballs = [], warnings = [];

        const btn = { x: WIDTH / 2 - 100, y: HEIGHT / 2 + 80, w: 200, h: 55 };

        const stages = {
            1: { x: 1050, y: 635, label: "FOREST PATH" },
            2: { x: 640, y: 520, label: "CENTRAL ISLAND" },
            3: { x: 170, y: 530, label: "OPEN OCEAN" },
            4: { x: 250, y: 140, label: "TOXICORP SHIP" }
        };

        // --- INITIALIZERS ---
        function initStage1() {
            score = 0; health = 100; trashList = []; quizTimer = 0; spawnTimer = 0;
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            currentQ = null; gameOver = false; gameWon = false; currentScene = 'STAGE1';
        }

        function initStage2() {
            score = 0; seedHP = 3000; timeLeft = 180; frameCount = 0; lumberjacks = [];
            shieldAngle = 0; targetShieldAngle = 0; gameOver = false; gameWon = false;
            quizTimer = 0; currentQ = null;
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            joystick.active = false; joystick.currX = joystick.baseX; joystick.currY = joystick.baseY;
            currentScene = 'STAGE2';
        }

        function initStage3() {
            score = 0; gameOver = false; gameWon = false; hookLength = 0; hookState = "idle";
            stunTimer = 0; fishHiddenTimer = 0; quizTimer = 0; currentQ = null; shakeAmount = 0;
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            s3Trash = []; s3Fish = [];
            for(let i=0; i<8; i++) s3Trash.push({ x: Math.random()*340, y: 10+Math.random()*30, speed: (Math.random()>0.5?2.5:-2.5), spriteIdx: Math.floor(Math.random()*trashSprites.length) });
            for(let i=0; i<4; i++) s3Fish.push({ x: Math.random()*340, y: 110+Math.random()*50, speed: (Math.random()>0.5?3:-3) });
            currentScene = 'STAGE3';
        }

        function initStage4() {
            health = 100; bossTimer = 60; dynamites = []; explosions = []; playerLane = 1;
            quizTimer = 0; spawnCooldown = 0; gameOver = false; gameWon = false; currentScene = 'STAGE4';
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5); currentQ = null;
        }

        function initStage5() {
            bossHP = 100; health = 100; fireballs = []; warnings = []; playerLane = 1; dynamites = [];
            explosions = []; waitingForQuiz = true;
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            currentQ = activeQuestions.shift(); turnQueue = 0; gameOver = false; gameWon = false; currentScene = 'STAGE5';
        }

        function handleInput(clientX, clientY, isStart, isEnd = false) {
            if (!assetsLoaded) return; 

            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width, scaleY = HEIGHT / rect.height;
            const x = (clientX - rect.left) * scaleX, y = (clientY - rect.top) * scaleY;

            if (isEnd) {
                joystick.active = false;
                joystick.currX = joystick.baseX;
                joystick.currY = joystick.baseY;
                return;
            }

            if (currentScene === 'MAP' && isStart) {
                for (let id in stages) {
                    if (Math.hypot(x - stages[id].x, y - stages[id].y) < 60 && id <= unlockedStages) {
                        if (id == 1) initStage1();
                        else if (id == 2) initStage2();
                        else if (id == 3) initStage3();
                        else if (id == 4) initStage4();
                    }
                }
            } else if (currentScene === 'STAGE1') {
                const vmx = x/2, vmy = y/2;
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) {
                        if (gameWon) {
                            if (unlockedStages < 2) { 
                                unlockedStages = 2; 
                                saveGame(); // SAVE TRIGGER
                            }
                            currentScene = 'MAP';
                        }
                        else initStage1();
                    }
                } else if (currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        if (vmx > 140 && vmx < 500 && vmy > 130 + i*40 && vmy < 160 + i*40) {
                            if (i === currentQ.correct) score += 200;
                            else health -= 20;
                            currentQ = null;
                        }
                    });
                } else if (isStart) {
                    for (let i = trashList.length - 1; i >= 0; i--) {
                        const t = trashList[i];
                        if (vmx > t.x && vmx < t.x + 96 && vmy > t.y && vmy < t.y + 96) {
                            score += 50;
                            trashList.splice(i, 1);
                            return;
                        }
                    }
                }
            } else if (currentScene === 'STAGE2') {
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) {
                        if (gameWon) {
                            if (unlockedStages < 3) {
                                unlockedStages = 3;
                                saveGame(); // SAVE TRIGGER
                            }
                            currentScene = 'MAP';
                        }
                        else initStage2();
                    }
                }
                if (currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        const qy = (HEIGHT/2 - 100) + 80 + i*45;
                        if (x > WIDTH/2 - 150 && x < WIDTH/2 + 150 && y > qy && y < qy + 35) {
                            if (i === currentQ.correct) {
                                score += 500;
                                seedHP = Math.min(3000, seedHP + 1000);
                            } else {
                                seedHP = Math.max(0, seedHP - 500);
                            }
                            currentQ = null;
                        }
                    });
                }
                const dist = Math.hypot(x - joystick.baseX, y - joystick.baseY);
                if (isStart && dist < joystick.radius * 1.5) joystick.active = true;
                if (joystick.active) {
                    const angle = Math.atan2(y - joystick.baseY, x - joystick.baseX);
                    joystick.currX = joystick.baseX + Math.cos(angle) * Math.min(dist, joystick.radius);
                    joystick.currY = joystick.baseY + Math.sin(angle) * Math.min(dist, joystick.radius);
                    targetShieldAngle = angle;
                }
            } else if (currentScene === 'STAGE3') {
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) {
                        if (gameWon && unlockedStages < 4) {
                            unlockedStages = 4;
                            saveGame(); // SAVE TRIGGER
                        }
                        currentScene = 'MAP';
                    }
                } else if (currentQ && isStart) {
                    const qyBase = (HEIGHT/2 - 100) + 80;
                    currentQ.a.forEach((_, i) => {
                        if (x > WIDTH/2-150 && x < WIDTH/2+150 && y > qyBase + i*45 && y < qyBase + i*45 + 35) {
                            if (i === currentQ.correct) {
                                score += 1000;
                                fishHiddenTimer = 5.0;
                            } else score = Math.max(0, score - 500);
                            currentQ = null;
                        }
                    });
                } else if (isStart && hookState === "idle" && stunTimer <= 0) {
                    hookState = "extend";
                }
            } else if (currentScene === 'STAGE4') {
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) currentScene = 'MAP';
                } else if (currentQ && isStart) {
                    const qyBase = (HEIGHT/2 - 100) + 80;
                    currentQ.a.forEach((_, i) => {
                        if (x > WIDTH/2-150 && x < WIDTH/2+150 && y > qyBase + i*45 && y < qyBase + i*45 + 35) {
                            if (i === currentQ.correct) health = 100;
                            currentQ = null;
                        }
                    });
                } else if (isStart) {
                    if (y < s4Borders[0]) playerLane = 0;
                    else if (y < s4Borders[1]) playerLane = 1;
                    else playerLane = 2;
                }
            } else if (currentScene === 'STAGE5') {
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) currentScene = 'MAP';
                } else if (waitingForQuiz && currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        const by = (HEIGHT/2 - 100) + 80 + i*45;
                        if (x > WIDTH/2 - 150 && x < WIDTH/2 + 150 && y > by && y < by + 35) {
                            if (i === currentQ.correct) {
                                bossHP -= 10; turnQueue = 5;
                            } else {
                                turnQueue = 15;
                            }
                            currentQ = null; waitingForQuiz = false;
                        }
                    });
                } else if (isStart && !waitingForQuiz) {
                    playerLane = Math.floor(x / (WIDTH / 4));
                }
            }
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000 || 0.016;
            lastTime = timestamp;

            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            if (!assetsLoaded) {
                if (loadingImg.complete) ctx.drawImage(loadingImg, 0, 0, WIDTH, HEIGHT);
                const percent = Math.floor((loadedCount / totalAssets) * 100);
                ctx.fillStyle = "white";
                ctx.font = "bold 35px monospace";
                ctx.textAlign = "center";
                ctx.fillText(`LOADING: ${percent}%`, WIDTH/2, HEIGHT - 80);
                requestAnimationFrame(gameLoop);
                return;
            } else if (currentScene === 'LOADING') {
                currentScene = 'MAP';
            }

            const wavy = Math.sin(Date.now() / 600) * 20;

            if (currentScene === 'MAP') {
                ctx.drawImage(mapImg, 0, 0, WIDTH, HEIGHT);
                for (let id in stages) {
                    const s = stages[id];
                    const isLocked = id > unlockedStages;
                    ctx.fillStyle = isLocked ? "rgba(0,0,0,0.8)" : "rgba(255,255,255,0.5)";
                    
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 45, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = "white";
                    ctx.textAlign = "center";
                    ctx.font = "bold 18px monospace";
                    ctx.fillText(s.label, s.x, s.y + 75);
                }
            } else if (currentScene === 'STAGE1') {
                if (!gameOver && !gameWon) {
                    if (!currentQ) {
                        quizTimer += dt;
                        if (quizTimer >= 10 && activeQuestions.length > 0) {
                            currentQ = activeQuestions.shift(); quizTimer = 0;
                        }
                        spawnTimer += dt;
                        if (spawnTimer >= 0.5) {
                            const isCanal = Math.random() < 0.15;
                            trashList.push({
                                type: isCanal ? 'canal' : 'garden',
                                x: isCanal ? -110 : 130+Math.random()*300,
                                y: isCanal ? 80 : 180+Math.random()*80,
                                speed: isCanal ? (7+Math.random()*4+score/1000) : 0,
                                spriteIdx: Math.floor(Math.random()*trashSprites.length)
                            });
                            spawnTimer = 0;
                        }
                    }
                    bgTimer += dt;
                    if (bgTimer >= 0.2) { bgTimer = 0; currentFrame = (currentFrame+1)%Math.max(1, framesLoaded); }
                    
                    let gc = 0;
                    for (let i = trashList.length - 1; i >= 0; i--) {
                        const t = trashList[i];
                        if (t.type === 'garden') gc++;
                        else {
                            t.x += t.speed;
                            if (t.x > V_WIDTH + 50) { health -= 10; trashList.splice(i, 1); }
                        }
                    }
                    if (gc > 8) health -= 4 * dt;
                    if (health <= 0) gameOver = true;
                    if (score >= 5000) gameWon = true;
                }

                ctx.save();
                ctx.scale(2, 2);
                if (bgFrames[currentFrame]) ctx.drawImage(bgFrames[currentFrame], 0, 0, V_WIDTH, V_HEIGHT);
                trashList.forEach(t => {
                    if (trashSprites[t.spriteIdx].complete) ctx.drawImage(trashSprites[t.spriteIdx], t.x, t.y, 96, 96);
                });
                
                ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 18px monospace";
                ctx.fillText(`SCORE: ${score}`, V_WIDTH - 20, 35);
                ctx.fillStyle = "#333"; ctx.fillRect(V_WIDTH/2 - 75, 18, 150, 14);
                ctx.fillStyle = health > 30 ? "#2ed573" : "#ff4757";
                ctx.fillRect(V_WIDTH/2 - 75, 18, 150 * (health / 100), 14);
                
                if (currentQ) drawQuizUI_S1();
                ctx.restore();

            } else if (currentScene === 'STAGE2') {
                if (!gameOver && !gameWon) {
                    if (!currentQ) {
                        quizTimer += dt;
                        if (quizTimer >= 10 && activeQuestions.length > 0) {
                            currentQ = activeQuestions.shift(); quizTimer = 0;
                        }
                        frameCount++;
                        if (frameCount % 60 === 0) timeLeft--;
                        
                        let ad = targetShieldAngle - shieldAngle;
                        while (ad < -Math.PI) ad += Math.PI * 2;
                        while (ad > Math.PI) ad -= Math.PI * 2;
                        shieldAngle += ad * 0.25;

                        if (score >= 10000) gameWon = true;
                        if (seedHP <= 0 || timeLeft <= 0) { seedHP = 0; gameOver = true; }

                        if (frameCount % 28 === 0) lumberjacks.push({ dist: 850, angle: spawnAngles[Math.floor(Math.random()*spawnAngles.length)]*Math.PI/180, speed: 3.5 });
                        
                        lumberjacks.forEach((lj, i) => {
                            lj.dist -= lj.speed;
                            if (lj.dist < 120 && lj.dist > 70) {
                                let diff = Math.abs(lj.angle - shieldAngle);
                                while (diff > Math.PI) diff -= Math.PI * 2;
                                if (Math.abs(diff) < 0.65) { score += 100; lumberjacks.splice(i, 1); }
                            }
                            if (lj.dist < 35) { seedHP -= 250; lumberjacks.splice(i, 1); }
                        });
                    }
                }

                if (forestBg.complete) ctx.drawImage(forestBg, 0, 0, WIDTH, HEIGHT);
                let sS = score >= 7500 ? 180 : (score >= 5000 ? 120 : 60);
                let cE = score >= 7500 ? treeImg : (score >= 5000 ? semiTreeImg : plantImg);
                if (cE.complete) ctx.drawImage(cE, CENTER.x-(sS/2), CENTER.y-(sS/2), sS, sS);

                ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 14;
                ctx.beginPath();
                ctx.arc(CENTER.x, CENTER.y, 105, shieldAngle - 0.75, shieldAngle + 0.75);
                ctx.stroke();

                lumberjacks.forEach(lj => {
                    const lx = CENTER.x+Math.cos(lj.angle)*lj.dist, ly = CENTER.y+Math.sin(lj.angle)*lj.dist;
                    if (lumberjackImg.complete) {
                        ctx.save();
                        ctx.translate(lx, ly);
                        ctx.rotate(lj.angle+Math.PI/2);
                        ctx.drawImage(lumberjackImg, -30, -30, 60, 60);
                        ctx.restore();
                    }
                });

                ctx.fillStyle="white"; ctx.font="bold 26px monospace"; ctx.textAlign="center";
                ctx.fillText(`SCORE: ${score}/10000 | HP: ${seedHP} | TIME: ${timeLeft}`, WIDTH/2, 50);

                ctx.strokeStyle="white"; ctx.beginPath(); ctx.arc(joystick.baseX, joystick.baseY, joystick.radius, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle="rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(joystick.currX, joystick.currY, 40, 0, Math.PI*2); ctx.fill();

                if (currentQ) drawQuizUI_Shared();

            } else if (currentScene === 'STAGE3') {
                if (stunTimer > 0) stunTimer -= dt;
                if (fishHiddenTimer > 0) fishHiddenTimer -= dt;
                if (shakeAmount > 0) shakeAmount -= dt * 20;

                if (!gameOver && !gameWon && !currentQ) {
                    quizTimer += dt;
                    if (quizTimer >= 10 && activeQuestions.length > 0) { currentQ = activeQuestions.shift(); quizTimer = 0; }

                    bgTimer += dt;
                    if (bgTimer >= 0.15) { bgTimer = 0; currentFrame = (currentFrame + 1) % 3; }

                    if (hookState === "extend") {
                        hookLength += 850 * dt;
                        if (hookLength > 265) hookState = "return";
                    } else if (hookState === "return") {
                        hookLength -= 650 * dt;
                        if (hookLength <= 0) { hookLength = 0; hookState = "idle"; }
                    }

                    const tipX = S3_W/2, tipY = 265 - hookLength;

                    s3Fish.forEach(f => {
                        f.x += f.speed;
                        if (f.x < -100 || f.x > S3_W+100) f.speed *= -1;
                        if (fishHiddenTimer <= 0 && hookState === "extend" && Math.hypot(tipX-(f.x+37), tipY-(f.y+22)) < 28) {
                            hookState = "return"; stunTimer = 1.0; shakeAmount = 15;
                        }
                    });

                    s3Trash.forEach((t, i) => {
                        t.x += t.speed;
                        if (t.x < 0 || t.x > S3_W-55) t.speed *= -1;
                        if (hookState === "extend" && Math.hypot(tipX-(t.x+27), tipY-(t.y+27)) < 30) {
                            score += 500; s3Trash.splice(i, 1); hookState = "return";
                            if (score >= 15000) gameWon = true;
                        }
                    });

                    if (s3Trash.length === 0) {
                        for(let i=0; i<8; i++) s3Trash.push({ x: Math.random()*340, y: 10+Math.random()*30, speed: (Math.random()>0.5?2.5:-2.5), spriteIdx: Math.floor(Math.random()*trashSprites.length) });
                    }
                }

                ctx.save();
                if (shakeAmount > 0) ctx.translate(Math.random()*shakeAmount-shakeAmount/2, Math.random()*shakeAmount-shakeAmount/2);
                ctx.scale(3.2, 2.4);
                if (s3Bgs[currentFrame]) ctx.drawImage(s3Bgs[currentFrame], 0, 0, S3_W, S3_H);

                ctx.strokeStyle = stunTimer > 0 ? "red" : (fishHiddenTimer > 0 ? "#00ff00" : "white");
                ctx.beginPath(); ctx.moveTo(S3_W/2, 265); ctx.lineTo(S3_W/2, 265-hookLength); ctx.stroke();

                if (fishHiddenTimer <= 0) s3Fish.forEach(f => {
                    ctx.save(); ctx.translate(f.x+(f.speed<0?75:0), f.y); if(f.speed<0) ctx.scale(-1,1);
                    if(fishImg.complete) ctx.drawImage(fishImg, 0, 0, 75, 45); ctx.restore();
                });

                s3Trash.forEach(t => { if(trashSprites[t.spriteIdx].complete) ctx.drawImage(trashSprites[t.spriteIdx], t.x, t.y, 55, 55); });
                if (boatImg.complete) ctx.drawImage(boatImg, S3_W/2-70, 245, 140, 70);
                ctx.restore();

                ctx.fillStyle = "white"; ctx.font = "bold 28px monospace"; ctx.textAlign = "center";
                ctx.fillText(`SCORE: ${score} / 15000`, WIDTH/2, 50);

                if (currentQ) drawQuizUI_Shared();

            } else if (currentScene === 'STAGE4') {
                if (!gameOver && !gameWon) {
                    if (!currentQ) {
                        bossTimer -= dt; spawnCooldown -= dt; quizTimer += dt;
                        if (quizTimer >= 15 && activeQuestions.length > 0) { currentQ = activeQuestions.shift(); quizTimer = 0; }
                        
                        if (bossTimer <= 0) initStage5();
                        
                        if (spawnCooldown <= 0) {
                            dynamites.push({ x: WIDTH, bIdx: Math.random() < 0.5 ? 0 : 1, speed: 12, warning: 0.5 });
                            spawnCooldown = 1.6;
                        }

                        dynamites.forEach((d, i) => {
                            if (d.warning > 0) d.warning -= dt;
                            else d.x -= d.speed;
                            
                            if (d.x < 280 && d.x > 140 && (playerLane === d.bIdx || playerLane === d.bIdx + 1)) {
                                health -= 20; explosions.push({ x: d.x, y: s4Borders[d.bIdx], life: 0.6 });
                                dynamites.splice(i, 1);
                            } else if (d.x < -100) {
                                explosions.push({ x: 50, y: s4Borders[d.bIdx], life: 0.6 });
                                dynamites.splice(i, 1);
                            }
                        });
                    }

                    explosions.forEach((e, i) => { e.life -= dt; if (e.life <= 0) explosions.splice(i, 1); });
                    if (health <= 0) gameOver = true;
                }

                if (riverBg.complete) ctx.drawImage(riverBg, 0, 0, WIDTH, HEIGHT);
                ctx.drawImage(shipImg, WIDTH - 550, 180 + wavy, 600, 350);
                ctx.drawImage(boatGuyImg, 130, s4LanesY[playerLane] - 90 + wavy, 180, 180);
                dynamites.forEach(d => ctx.drawImage(tntImg, d.x - 30, s4Borders[d.bIdx] - 30, 60, 60));
                
                explosions.forEach(e => {
                    if (explodeImg.complete) { ctx.globalAlpha = e.life*1.5; ctx.drawImage(explodeImg, e.x-300, e.y-300, 600, 600); ctx.globalAlpha = 1; }
                });

                ctx.fillStyle = "#333"; ctx.fillRect(50, 20, 300, 25);
                ctx.fillStyle = "#2ed573"; ctx.fillRect(50, 20, 300 * (health / 100), 25);
                ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(50, 20, 300, 25);
                ctx.fillStyle = "white"; ctx.font = "bold 24px monospace"; ctx.textAlign="left";
                ctx.fillText(`REACH SHIP: ${Math.ceil(bossTimer)}s`, 50, 75);

                if (currentQ) drawQuizUI_Shared();

            } else if (currentScene === 'STAGE5') {
                if (!gameOver && !gameWon) {
                    if (!waitingForQuiz && turnQueue > 0 && fireballs.length === 0 && warnings.length === 0) {
                        let lns = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
                        [lns[0], lns[1]].forEach(lane => {
                            warnings.push({ lane, timer: 1.2 });
                            setTimeout(() => { if (currentScene === 'STAGE5') fireballs.push({ lane, y: 150, speed: 14 }); }, 1200);
                        });
                        turnQueue--;
                    } else if (!waitingForQuiz && turnQueue === 0 && fireballs.length === 0 && warnings.length === 0) {
                        waitingForQuiz = true; currentQ = activeQuestions.length > 0 ? activeQuestions.shift() : questionsBank[Math.floor(Math.random()*questionsBank.length)];
                    }

                    fireballs.forEach((f, i) => {
                        f.y += f.speed;
                        if (f.y > HEIGHT - 100) {
                            explosions.push({ x: s5LanesX[f.lane], y: HEIGHT - 50, life: 0.5 });
                            if (playerLane === f.lane) health -= 20;
                            fireballs.splice(i, 1);
                        }
                    });

                    warnings.forEach((w, i) => { w.timer -= dt; if (w.timer <= 0) warnings.splice(i, 1); });
                    explosions.forEach((e, i) => { e.life -= dt; if (e.life <= 0) explosions.splice(i, 1); });

                    if (health <= 0) gameOver = true;
                    if (bossHP <= 0) { bossHP = 0; gameWon = true; }
                }

                if (backunawaImg.complete) ctx.drawImage(backunawaImg, 0, 0, WIDTH, HEIGHT);
                ctx.drawImage(boatkunawaImg, WIDTH/2 - 400, 20 + wavy, 800, 500);

                warnings.forEach(w => { ctx.fillStyle = "rgba(255,0,0,0.4)"; ctx.fillRect(w.lane*320, 0, 320, HEIGHT); });
                fireballs.forEach(f => { if (payrImg.complete) ctx.drawImage(payrImg, s5LanesX[f.lane] - 60, f.y - 60, 120, 120); });
                
                ctx.drawImage(boatGuyImg, s5LanesX[playerLane]-90, HEIGHT-200+wavy, 180, 180);
                
                explosions.forEach(e => {
                    if (explodeImg.complete) { ctx.globalAlpha = e.life*1.5; ctx.drawImage(explodeImg, e.x-300, e.y-300, 600, 600); ctx.globalAlpha = 1; }
                });

                ctx.fillStyle = "white"; ctx.font = "bold 28px monospace"; ctx.textAlign = "center";
                ctx.fillText(`BAKUNAWA HP: ${bossHP}% | HEALTH: ${health}`, WIDTH/2, 50);

                if (waitingForQuiz && currentQ) drawQuizUI_Shared();
            }

            if (currentScene !== 'MAP' && (gameOver || gameWon)) {
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.font = "bold 70px monospace";
                ctx.fillText(gameWon ? "STAGE CLEAR" : "DEFEATED", WIDTH/2, HEIGHT/2 - 20);
                
                ctx.fillStyle = "#1a441a"; ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
                ctx.fillStyle = "white"; ctx.font = "bold 24px monospace";
                ctx.fillText(gameWon ? "STAGE MAP" : "TRY AGAIN", WIDTH/2, btn.y + 35);
            }

            requestAnimationFrame(gameLoop);
        }

        function drawQuizUI_S1() {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(50, 50, V_WIDTH - 100, V_HEIGHT - 100);
            ctx.fillStyle = "white"; ctx.font = "14px monospace"; ctx.textAlign = "center";
            ctx.fillText(currentQ.q, V_WIDTH/2, 90);
            currentQ.a.forEach((ans, i) => {
                ctx.fillStyle = "#2f3542"; ctx.fillRect(140, 130 + i*40, V_WIDTH-280, 30);
                ctx.fillStyle = "white"; ctx.fillText(ans, V_WIDTH/2, 150 + i*40);
            });
        }

        function drawQuizUI_Shared() {
            ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = "white"; ctx.font = "bold 28px monospace"; ctx.textAlign = "center";
            ctx.fillText(currentQ.q, WIDTH/2, HEIGHT/2 - 100);
            currentQ.a.forEach((ans, i) => {
                ctx.fillStyle = "#2f3542"; ctx.fillRect(WIDTH/2 - 150, (HEIGHT/2 - 100) + 80 + i*45, 300, 35);
                ctx.fillStyle = "white"; ctx.font = "18px monospace";
                ctx.fillText(ans, WIDTH/2, (HEIGHT/2 - 100) + 103 + i*45);
            });
        }

        canvas.addEventListener('mousedown', e => handleInput(e.clientX, e.clientY, true));
        canvas.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY, false));
        window.addEventListener('mouseup', () => handleInput(0, 0, false, true));

        canvas.addEventListener('touchstart', e => { handleInput(e.touches[0].clientX, e.touches[0].clientY, true); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchmove', e => { handleInput(e.touches[0].clientX, e.touches[0].clientY, false); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchend', () => handleInput(0, 0, false, true));

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
