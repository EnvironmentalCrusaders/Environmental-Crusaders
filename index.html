<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Crusaders - Final Showdown</title>
    <style>
        body {
            margin: 0;
            background: #0a0d0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            border: 4px solid #2ed573;
            background: #000;
            max-width: 1280px;
            width: 100%;
            height: auto;
            box-shadow: 0 0 30px rgba(46, 213, 115, 0.3);
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 1280;
        const HEIGHT = 720;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        const CENTER = { x: WIDTH / 2, y: HEIGHT / 2 };

        // --- PROGRESS & PERSISTENCE ---
        let playerName = localStorage.getItem('crusaders_playerName') || "";
        let unlockedStages = localStorage.getItem('crusaders_progress') ? 
                             parseInt(localStorage.getItem('crusaders_progress')) : 1;
        let journal = JSON.parse(localStorage.getItem('crusaders_journal')) || [];
        
        let isEnteringName = (playerName === "");
        let currentScene = 'LOADING'; 
        let invincible = false;
        
        function saveGame() {
            localStorage.setItem('crusaders_progress', unlockedStages);
            localStorage.setItem('crusaders_journal', JSON.stringify(journal));
            localStorage.setItem('crusaders_playerName', playerName);
        }

        function addToJournal(question) {
            if (!journal.includes(question)) {
                journal.push(question);
                saveGame();
            }
        }

        // --- CUTSCENE SYSTEMS ---
        let dialogueIndex = 0;
        let charIndex = 0;
        let typewriterTimer = 0;

        const cutsceneDialogue = [
            { speaker: "MC", text: "It's been a while since I last visited the province." },
            { speaker: "Grandmother", text: "Come here, my child. I need to talk to you about something important." },
            { speaker: "MC", text: "What is it, Grandma?" },
            { speaker: "Grandmother", text: "This pendant… it has been passed down in our family for generations. Now, it belongs to you." },
            { speaker: "MC", text: "A pendant? Why me?" },
            { speaker: "Grandmother", text: "Because you are the chosen one. This pendant holds a special power.
            A disaster is coming, and only the one who carries this pendant can stop it." },
            { speaker: "MC", text: "A disaster…?" },
            { speaker: "Grandmother", text: "Yes. There are other pieces of this pendant scattered around the world. You must find them before it's too late." },
            { speaker: "MC", text: "I understand, Grandma. I'll do my best." },
            { speaker: "Pendant", text: "Greetings, chosen one. I am Emre, a deity of nature and bountiful harvest." },
            { speaker: "Pendant", text: "My reign diminishes as the world gets overpopulated and neglected. When the balance fails, Bakunawa—the Wrath of Nature—arises to reclaim the earth." },
            { speaker: "MC", text: "Wait… the pendant can talk?! And you're a deity? Bakunawa is real?!" },
            { speaker: "Pendant", text: "Yes. We must find the other pieces to restore my strength and calm the wrath. Follow my guidance." }
        ];

        const cutscene2Dialogue = [
            { speaker: "Pendant", text: "Head in that direction." },
            { speaker: "MC", text: "There's an island over there." },
            { speaker: "Pendant", text: "You must cross the river." },
            { speaker: "MC", text: "Alright, let's go." },
            { speaker: "MC", text: "Wait… what's that glowing thing?" },
            { speaker: "Pendant", text: "That is a magical seed. It will help restore the balance of nature." },
            { speaker: "Pendant", text: "Protect the magical seed from the evil lumberjacks that wants to destroy it." }
        ];

        // --- ASSETS ---
        let assetsLoaded = false;
        let totalAssets = 0;
        let loadedCount = 0;
        const images = {};

        function loadImg(key, src) {
            totalAssets++;
            const img = new Image();
            img.src = src;
            img.onload = () => {
                loadedCount++;
                if (loadedCount === totalAssets) assetsLoaded = true;
            };
            images[key] = img;
            return img;
        }

        const mcImg = loadImg('mc', 'mc.png');
        const grandmaImg = loadImg('grandma', 'grandmother.png');
        const pendantImg = loadImg('pendant', 'pendant.png');
        const kuboBg = loadImg('kubo', 'Bahay Kubo.png');
        const textBoxImg = loadImg('textBox', 'text box.png');
        const butoImg = loadImg('buto', 'buto.png'); 
        const loadingImg = loadImg('loading', 'loading.png'); 
        const mapImg = loadImg('map', 'Stage Map.jpg');
        const boatImg = loadImg('boat', 'boat.png');
        const fishImg = loadImg('fish', 'fih.png');
        const forestBg = loadImg('forestBg', 'forestbg.png');
        const lumberjackImg = loadImg('lumberjack', 'lumberjack.png');
        const plantImg = loadImg('plant', 'plant.png');
        const semiTreeImg = loadImg('semiTree', 'semi-tree.png');
        const treeImg = loadImg('tree', 'tree.png');
        const boatGuyImg = loadImg('boatGuy', 'boatguy.png');
        const riverBg = loadImg('riverBg', 'stillwater.png');
        const backunawaImg = loadImg('backunawa', 'backunawa.png');
        const boatkunawaImg = loadImg('boatkunawa', 'boatkunawa.png');
        const shipImg = loadImg('ship', 'ship.png');
        const tntImg = loadImg('tnt', 'tnt.png');
        const explodeImg = loadImg('explode', 'explode.png');
        const payrImg = loadImg('payr', 'payr.png');

        const trashSpriteNames = ['newspaper.png', 'plasticbag.png', 'apple.png', 'banana.png', 'can.png'];
        const trashSprites = trashSpriteNames.map((src, i) => loadImg('trash' + i, src));
        const s3BgNames = ['wf1.png', 'wf2.png', 'wf3.png'];
        const s3Bgs = s3BgNames.map((src, i) => loadImg('wf' + i, src));
        const frameNames = ['bg_healthy.png', 'bg_medium.png', 'bg_wilted.png'];
        const bgFrames = frameNames.map((src, i) => loadImg('bgFrame' + i, src));

        // --- QUESTIONS ---
        const questionsBank = [
            { q: "Plastic waste can take hundreds of years to decompose.", a: ["True", "False"], correct: 0 },
            { q: "Which gas is mainly responsible for global warming?", a: ["Oxygen", "Carbon Dioxide", "Nitrogen"], correct: 1 },
            { q: "Turning off unused lights saves energy.", a: ["True", "False"], correct: 0 },
            { q: "Which material is non-biodegradable?", a: ["Paper", "Plastic", "Leaves"], correct: 1 },
            { q: "Oil spills harm marine life.", a: ["True", "False"], correct: 0 },
            { q: "Which practice helps reduce air pollution?", a: ["Using public transport", "Burning trash", "Cutting trees"], correct: 0 },
            { q: "Trees absorb carbon dioxide.", a: ["True", "False"], correct: 0 },
            { q: "Which energy source is renewable?", a: ["Coal", "Solar", "Oil"], correct: 1 },
            { q: "Recycling reduces landfill waste.", a: ["True", "False"], correct: 0 },
            { q: "Plastic bags are eco-friendly.", a: ["True", "False"], correct: 1 },
            { q: "Overfishing harms marine ecosystems.", a: ["True", "False"], correct: 0 },
            { q: "Using renewable energy reduces pollution.", a: ["True", "False"], correct: 0 },
            { q: "Sustainable development protects future needs.", a: ["True", "False"], correct: 0 }
        ];

        // --- GLOBAL STATE ---
        let previousScene = 'MAP'; 
        let score, health, seedHP, timeLeft, frameCount, gameOver, gameWon, lastTime = 0;
        let isSettingsOpen = false;
        let journalScroll = 0; 

        // --- STAGE VARS ---
        const V_WIDTH = 640;
        const V_HEIGHT = 360;
        let currentFrame = 0, bgTimer = 0, trashList = [], spawnTimer = 0, quizTimer = 0, currentQ = null;
        let activeQuestions = [];
        let lumberjacks = [];
        const spawnAngles = [90, 45, 135, 270, 315, 225];
        let shieldAngle = 0, targetShieldAngle = 0;
        const joystick = { baseX: 250, baseY: HEIGHT - 150, currX: 250, currY: HEIGHT - 150, radius: 80, active: false };

        const S3_W = 400;
        const S3_H = 300;
        let hookLength = 0, hookState = "idle", stunTimer = 0, shakeAmount = 0, fishHiddenTimer = 0;
        let s3Trash = [], s3Fish = [];

        const s4LanesY = [160, 360, 560];
        const s4Borders = [280, 440];
        const s5LanesX = [160, 480, 800, 1120];
        let playerLane = 1, dynamites = [], explosions = [], bossTimer = 30, spawnCooldown = 0;
        let bossHP = 100, turnQueue = 0, waitingForQuiz = true, fireballs = [], warnings = [];

        const btn = { x: WIDTH / 2 - 100, y: HEIGHT / 2 + 80, w: 200, h: 55 };
        const setBtnRect = { x: WIDTH - 120, y: 20, w: 100, h: 100 };

        const stages = {
            1: { x: 1050, y: 635, label: "FOREST PATH" },
            2: { x: 640, y: 520, label: "CENTRAL ISLAND" },
            3: { x: 170, y: 530, label: "OPEN OCEAN" },
            4: { x: 250, y: 140, label: "TOXICORP SHIP" }
        };

        // --- INITIALIZERS ---
        function restartCurrentStage() {
            if (currentScene === 'STAGE1') initStage1();
            else if (currentScene === 'STAGE2') initStage2();
            else if (currentScene === 'STAGE3') initStage3();
            else if (currentScene === 'STAGE4') initStage4();
            else if (currentScene === 'STAGE5') initStage5();
        }

        function initStage1() {
            score = 0; health = 100; trashList = []; quizTimer = 0; spawnTimer = 0;
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            currentQ = null; gameOver = false; gameWon = false; currentScene = 'STAGE1';
        }

        function initStage2Intro() { dialogueIndex = 0; charIndex = 0; currentScene = 'CUTSCENE2'; }

        function initStage2() {
            score = 0; seedHP = 3000; timeLeft = 180; frameCount = 0; lumberjacks = [];
            shieldAngle = 0; targetShieldAngle = 0; gameOver = false; gameWon = false;
            quizTimer = 0; currentQ = null; activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            joystick.active = false; joystick.currX = joystick.baseX; joystick.currY = joystick.baseY;
            currentScene = 'STAGE2';
        }

        function initStage3() {
            score = 0; gameOver = false; gameWon = false; hookLength = 0; hookState = "idle";
            stunTimer = 0; fishHiddenTimer = 0; quizTimer = 0; currentQ = null; shakeAmount = 0;
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            s3Trash = []; s3Fish = [];
            for(let i=0; i<8; i++) s3Trash.push({ x: Math.random()*340, y: 10+Math.random()*30, speed: (Math.random()>0.5?2.5:-2.5), spriteIdx: Math.floor(Math.random()*trashSprites.length) });
            for(let i=0; i<4; i++) s3Fish.push({ x: Math.random()*340, y: 110+Math.random()*50, speed: (Math.random()>0.5?3:-3) });
            currentScene = 'STAGE3';
        }

        function initStage4() {
            health = 100; bossTimer = 60; dynamites = []; explosions = []; playerLane = 1;
            quizTimer = 0; spawnCooldown = 0; gameOver = false; gameWon = false; currentScene = 'STAGE4';
            activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5); currentQ = null;
        }

        function initStage5() {
            bossHP = 100; health = 100; fireballs = []; warnings = []; playerLane = 1; dynamites = [];
            explosions = []; waitingForQuiz = true; activeQuestions = [...questionsBank].sort(() => Math.random() - 0.5);
            currentQ = activeQuestions.shift(); turnQueue = 0; gameOver = false; gameWon = false; currentScene = 'STAGE5';
        }

        // --- INPUT HANDLING ---
        function handleInput(clientX, clientY, isStart, isEnd = false) {
            if (!assetsLoaded) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width, scaleY = HEIGHT / rect.height;
            const x = (clientX - rect.left) * scaleX, y = (clientY - rect.top) * scaleY;

            if (isEnd) { joystick.active = false; joystick.currX = joystick.baseX; joystick.currY = joystick.baseY; return; }

            if (isEnteringName && isStart) {
                let name = prompt("Enter Player Name:");
                if (name) { playerName = name; isEnteringName = false; saveGame(); currentScene = 'CUTSCENE1'; }
                return;
            }

            if ((currentScene === 'CUTSCENE1' || currentScene === 'CUTSCENE2') && isStart) {
                const dialogue = currentScene === 'CUTSCENE1' ? cutsceneDialogue : cutscene2Dialogue;
                const line = dialogue[dialogueIndex];
                if (charIndex < line.text.length) charIndex = line.text.length;
                else {
                    dialogueIndex++; charIndex = 0;
                    if (dialogueIndex >= dialogue.length) {
                        if (currentScene === 'CUTSCENE1') currentScene = 'MAP';
                        else initStage2();
                    }
                }
                return;
            }

            if (isStart && x > setBtnRect.x && x < setBtnRect.x + setBtnRect.w && y > setBtnRect.y && y < setBtnRect.y + setBtnRect.h) {
                isSettingsOpen = !isSettingsOpen; return;
            }

            if (isSettingsOpen && isStart) {
                const centerX = WIDTH / 2;
                const menuY = 180;
                // Continue
                if (x > centerX - 150 && x < centerX + 150 && y > menuY && y < menuY + 50) isSettingsOpen = false;
                // Journal
                if (x > centerX - 150 && x < centerX + 150 && y > menuY + 60 && y < menuY + 110) { previousScene = currentScene; isSettingsOpen = false; currentScene = 'JOURNAL'; }
                // Insert Code
                if (x > centerX - 150 && x < centerX + 150 && y > menuY + 120 && y < menuY + 170) {
                    let code = prompt("Enter Secret Code:").toLowerCase();
                    if (code === "sigma01") { unlockedStages = 2; saveGame(); alert("Stage 1 Cleared!"); }
                    else if (code === "sigma02") { unlockedStages = 3; saveGame(); alert("Stage 2 Cleared!"); }
                    else if (code === "sigma03") { unlockedStages = 4; saveGame(); alert("Stage 3 Cleared!"); }
                    else if (code === "hesoyam") { invincible = true; alert("Invincibility Activated"); }
                    else if (code === "mayoseh") { invincible = false; alert("Invincibility Deactivated"); }
                    else if (code === "jaimewashere") { localStorage.clear(); location.reload(); }
                }
                if (currentScene.includes('STAGE')) {
                    if (x > centerX - 150 && x < centerX + 150 && y > menuY + 180 && y < menuY + 230) { isSettingsOpen = false; restartCurrentStage(); }
                    if (x > centerX - 150 && x < centerX + 150 && y > menuY + 240 && y < menuY + 290) { isSettingsOpen = false; currentScene = 'MAP'; }
                }
                return;
            }

            if (currentScene === 'JOURNAL' && isStart && y > 620) { currentScene = previousScene; journalScroll = 0; return; }

            if (currentScene === 'MAP' && isStart) {
                for (let id in stages) {
                    if (Math.hypot(x - stages[id].x, y - stages[id].y) < 60 && id <= unlockedStages) {
                        if (id == 1) initStage1(); else if (id == 2) initStage2Intro(); else if (id == 3) initStage3(); else if (id == 4) initStage4();
                    }
                }
            } else if (currentScene === 'STAGE1') {
                const vmx = x/2, vmy = y/2;
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) { if (gameWon) { unlockedStages = Math.max(unlockedStages, 2); saveGame(); currentScene = 'MAP'; } else initStage1(); }
                } else if (currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        if (vmx > 140 && vmx < 500 && vmy > 130 + i*40 && vmy < 160 + i*40) {
                            if (i === currentQ.correct) { score += 200; addToJournal(currentQ.q); } else if (!invincible) health -= 20;
                            currentQ = null;
                        }
                    });
                } else if (isStart) {
                    for (let i = trashList.length - 1; i >= 0; i--) {
                        const t = trashList[i]; if (vmx > t.x && vmx < t.x + 96 && vmy > t.y && vmy < t.y + 96) { score += 50; trashList.splice(i, 1); return; }
                    }
                }
            } else if (currentScene === 'STAGE2') {
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) { if (gameWon) { unlockedStages = Math.max(unlockedStages, 3); saveGame(); currentScene = 'MAP'; } else initStage2(); }
                }
                if (currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        const qy = (HEIGHT/2 - 100) + 80 + i*45;
                        if (x > WIDTH/2 - 150 && x < WIDTH/2 + 150 && y > qy && y < qy + 35) {
                            if (i === currentQ.correct) { score += 500; seedHP = Math.min(3000, seedHP + 1000); addToJournal(currentQ.q); } 
                            else if (!invincible) seedHP = Math.max(0, seedHP - 500); currentQ = null;
                        }
                    });
                }
                const dist = Math.hypot(x - joystick.baseX, y - joystick.baseY);
                if (isStart && dist < joystick.radius * 1.5) joystick.active = true;
                if (joystick.active) {
                    const angle = Math.atan2(y - joystick.baseY, x - joystick.baseX);
                    joystick.currX = joystick.baseX + Math.cos(angle) * Math.min(dist, joystick.radius);
                    joystick.currY = joystick.baseY + Math.sin(angle) * Math.min(dist, joystick.radius);
                    targetShieldAngle = angle;
                }
            } else if (currentScene === 'STAGE3') {
                if (isStart && (gameOver || gameWon)) {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) { if (gameWon) { unlockedStages = Math.max(unlockedStages, 4); saveGame(); } currentScene = 'MAP'; }
                } else if (currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        const qy = (HEIGHT/2 - 100) + 80 + i*45;
                        if (x > WIDTH/2-150 && x < WIDTH/2+150 && y > qy && y < qy + 35) {
                            if (i === currentQ.correct) { score += 1000; fishHiddenTimer = 5.0; addToJournal(currentQ.q); } else if (!invincible) score = Math.max(0, score - 500);
                            currentQ = null;
                        }
                    });
                } else if (isStart && hookState === "idle" && stunTimer <= 0) hookState = "extend";
            } else if (currentScene === 'STAGE4') {
                if (isStart && (gameOver || gameWon)) { if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) currentScene = 'MAP'; }
                else if (currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        const qy = (HEIGHT/2 - 100) + 80 + i*45;
                        if (x > WIDTH/2-150 && x < WIDTH/2+150 && y > qy && y < qy + 35) { if (i === currentQ.correct) { health = 100; addToJournal(currentQ.q); } currentQ = null; }
                    });
                } else if (isStart) {
                    if (y < s4Borders[0]) playerLane = 0; else if (y < s4Borders[1]) playerLane = 1; else playerLane = 2;
                }
            } else if (currentScene === 'STAGE5') {
                if (isStart && (gameOver || gameWon)) { if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) currentScene = 'MAP'; }
                else if (waitingForQuiz && currentQ && isStart) {
                    currentQ.a.forEach((_, i) => {
                        const by = (HEIGHT/2 - 100) + 80 + i*45;
                        if (x > WIDTH/2 - 150 && x < WIDTH/2 + 150 && y > by && y < by + 35) {
                            if (i === currentQ.correct) { bossHP -= 10; turnQueue = 5; addToJournal(currentQ.q); } else turnQueue = 15;
                            currentQ = null; waitingForQuiz = false;
                        }
                    });
                } else if (isStart && !waitingForQuiz) { playerLane = Math.floor(x / (WIDTH / 4)); }
            }
        }

        // --- MOUSE WHEEL FOR JOURNAL ---
        window.addEventListener('wheel', (e) => {
            if (currentScene === 'JOURNAL') {
                journalScroll -= e.deltaY;
                const maxScroll = -(journal.length * 45 - 350);
                if (journalScroll > 0) journalScroll = 0;
                if (journal.length > 9 && journalScroll < maxScroll) journalScroll = maxScroll;
            }
        });

        // --- MAIN GAME LOOP ---
        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000 || 0.016;
            lastTime = timestamp;
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            if (!assetsLoaded) {
                if (loadingImg.complete) ctx.drawImage(loadingImg, 0, 0, WIDTH, HEIGHT);
                ctx.fillStyle = "white"; ctx.font = "bold 35px monospace"; ctx.textAlign = "center";
                ctx.fillText(`LOADING: ${Math.floor((loadedCount/totalAssets)*100)}%`, WIDTH/2, HEIGHT - 80);
                requestAnimationFrame(gameLoop); return;
            } 
            
            if (currentScene === 'LOADING') {
                if (playerName !== "") currentScene = 'MAP';
                else isEnteringName = true;
            }

            if (isEnteringName) {
                if (loadingImg.complete) ctx.drawImage(loadingImg, 0, 0, WIDTH, HEIGHT);
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = "#2ed573"; ctx.font = "bold 40px monospace"; ctx.textAlign = "center";
                ctx.fillText("TAP TO ENTER PLAYER NAME", WIDTH/2, HEIGHT/2 + 150);
                requestAnimationFrame(gameLoop); return;
            }

            if (currentScene === 'CUTSCENE1' || currentScene === 'CUTSCENE2') {
                const dialogue = currentScene === 'CUTSCENE1' ? cutsceneDialogue : cutscene2Dialogue;
                const line = dialogue[dialogueIndex];
                const bg = currentScene === 'CUTSCENE1' ? kuboBg : forestBg;
                if (bg.complete) ctx.drawImage(bg, 0, 0, WIDTH, HEIGHT);
                let talkerImg = line.speaker === "MC" ? mcImg : (line.speaker === "Grandmother" ? grandmaImg : pendantImg);
                if (talkerImg && talkerImg.complete) ctx.drawImage(talkerImg, 120, HEIGHT - 620, 350, 500);
                if (textBoxImg.complete) ctx.drawImage(textBoxImg, 0, 0, WIDTH, HEIGHT);
                ctx.fillStyle = "black"; ctx.font = "bold 34px monospace"; ctx.textAlign = "left";
                ctx.fillText(line.speaker === "MC" ? playerName : line.speaker, 120, HEIGHT - 165);
                typewriterTimer += dt; if (typewriterTimer > 0.03 && charIndex < line.text.length) { charIndex++; typewriterTimer = 0; }
                ctx.fillStyle = "white"; ctx.font = "26px monospace";
                let wrapY = HEIGHT - 110;
                line.text.substring(0, charIndex).split('\n').forEach(l => { ctx.fillText(l, 120, wrapY); wrapY += 38; });
                requestAnimationFrame(gameLoop); return;
            }

            const wavy = Math.sin(Date.now() / 600) * 20;

            if (currentScene === 'MAP') {
                ctx.drawImage(mapImg, 0, 0, WIDTH, HEIGHT);
                for (let id in stages) {
                    const s = stages[id]; const isLocked = id > unlockedStages;
                    ctx.fillStyle = isLocked ? "rgba(0,0,0,0.8)" : "rgba(46, 213, 115, 0.6)";
                    ctx.beginPath(); ctx.arc(s.x, s.y, 45, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
                    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 18px monospace";
                    ctx.fillText(s.label, s.x, s.y + 75);
                    // ADDED: Stage labels in white
                    ctx.fillStyle = "white"; ctx.font = "bold 22px monospace";
                    ctx.fillText("STAGE " + id, s.x, s.y - 65);
                }
            } else if (currentScene === 'JOURNAL') {
                const grad = ctx.createRadialGradient(WIDTH/2, HEIGHT/2, 100, WIDTH/2, HEIGHT/2, 800);
                grad.addColorStop(0, "#1a3c1a"); grad.addColorStop(1, "#0a0d0a");
                ctx.fillStyle = grad; ctx.fillRect(0, 0, WIDTH, HEIGHT);
                ctx.strokeStyle = "#2ed573"; ctx.lineWidth = 2; ctx.strokeRect(50, 30, WIDTH - 100, 80);
                ctx.fillStyle = "#2ed573"; ctx.font = "bold 45px monospace"; ctx.textAlign = "center";
                ctx.fillText("ECO-CRUSADER FIELD GUIDE", WIDTH/2, 85);
                ctx.font = "bold 18px monospace"; ctx.fillStyle = "#ffffff";
                ctx.fillText(`DATABASE SYNC: ${Math.floor((journal.length / questionsBank.length) * 100)}% | ENTRIES: ${journal.length}`, WIDTH/2, 140);
                ctx.save(); ctx.beginPath(); ctx.rect(100, 160, WIDTH - 200, 420); ctx.clip();
                if (journal.length === 0) {
                    ctx.globalAlpha = 0.5; ctx.textAlign = "center";
                    ctx.fillText(">> NO DATA RECOVERED <<", WIDTH/2, 350);
                } else {
                    ctx.textAlign = "left";
                    journal.forEach((txt, i) => {
                        const entryY = 200 + i * 45 + journalScroll;
                        ctx.fillStyle = "rgba(46, 213, 115, 0.1)"; ctx.fillRect(110, entryY - 25, WIDTH - 240, 35);
                        ctx.fillStyle = "#fff"; ctx.font = "16px monospace"; ctx.fillText(`[DECODED] ${txt}`, 130, entryY);
                    });
                }
                ctx.restore();
                ctx.fillStyle = "#ff4757"; ctx.fillRect(WIDTH/2 - 100, 620, 200, 50);
                ctx.fillStyle = "white"; ctx.font = "bold 20px monospace"; ctx.fillText("CLOSE GUIDE", WIDTH/2, 652);
            } else if (currentScene === 'STAGE1') {
                if (!gameOver && !gameWon && !isSettingsOpen) {
                    if (!currentQ) {
                        quizTimer += dt; if (quizTimer >= 10 && activeQuestions.length > 0) { currentQ = activeQuestions.shift(); quizTimer = 0; }
                        spawnTimer += dt; if (spawnTimer >= 0.5) {
                            const isCanal = Math.random() < 0.15;
                            trashList.push({ type: isCanal ? 'canal' : 'garden', x: isCanal ? -110 : 130+Math.random()*300, y: isCanal ? 80 : 180+Math.random()*80, speed: isCanal ? (7+Math.random()*4+score/1000) : 0, spriteIdx: Math.floor(Math.random()*trashSprites.length) });
                            spawnTimer = 0;
                        }
                        bgTimer += dt; if (bgTimer >= 0.2) { bgTimer = 0; currentFrame = (currentFrame+1)%3; }
                        for (let i = trashList.length - 1; i >= 0; i--) {
                            const t = trashList[i]; if (t.type !== 'garden') { t.x += t.speed; if (t.x > V_WIDTH + 50) { if (!invincible) health -= 10; trashList.splice(i, 1); } }
                        }
                        if (health <= 0) gameOver = true; if (score >= 5000) gameWon = true;
                    }
                }
                ctx.save(); ctx.scale(2, 2);
                if (bgFrames[currentFrame]) ctx.drawImage(bgFrames[currentFrame], 0, 0, V_WIDTH, V_HEIGHT);
                trashList.forEach(t => { if (trashSprites[t.spriteIdx].complete) ctx.drawImage(trashSprites[t.spriteIdx], t.x, t.y, 96, 96); });
                ctx.fillStyle = "#333"; ctx.fillRect(V_WIDTH/2 - 75, 18, 150, 14);
                ctx.fillStyle = health > 30 ? "#2ed573" : "#ff4757"; ctx.fillRect(V_WIDTH/2 - 75, 18, 150 * (health / 100), 14);
                ctx.fillStyle = "white"; ctx.font = "bold 16px monospace"; ctx.textAlign="left"; ctx.fillText(`${playerName}: ${score}`, V_WIDTH/2 + 85, 30);
                if (currentQ) drawQuizUI_S1(); ctx.restore();
            } else if (currentScene === 'STAGE2') {
                if (!gameOver && !gameWon && !isSettingsOpen) {
                    if (!currentQ) {
                        quizTimer += dt; if (quizTimer >= 10 && activeQuestions.length > 0) { currentQ = activeQuestions.shift(); quizTimer = 0; }
                        frameCount++; if (frameCount % 60 === 0) timeLeft--;
                        let ad = targetShieldAngle - shieldAngle; while (ad < -Math.PI) ad += Math.PI * 2; while (ad > Math.PI) ad -= Math.PI * 2;
                        shieldAngle += ad * 0.25;
                        if (score >= 10000) gameWon = true; if (seedHP <= 0 || timeLeft <= 0) { seedHP = 0; gameOver = true; }
                        if (frameCount % 28 === 0) lumberjacks.push({ dist: 850, angle: spawnAngles[Math.floor(Math.random()*spawnAngles.length)]*Math.PI/180, speed: 3.5 });
                        lumberjacks.forEach((lj, i) => {
                            lj.dist -= lj.speed; if (lj.dist < 120 && lj.dist > 70) {
                                let diff = Math.abs(lj.angle - shieldAngle); while (diff > Math.PI) diff -= Math.PI * 2;
                                if (Math.abs(diff) < 0.65) { score += 100; lumberjacks.splice(i, 1); }
                            }
                            if (lj.dist < 35) { if (!invincible) seedHP -= 250; lumberjacks.splice(i, 1); }
                        });
                    }
                }
                if (forestBg.complete) ctx.drawImage(forestBg, 0, 0, WIDTH, HEIGHT);
                let sS = score >= 7500 ? 180 : (score >= 5000 ? 120 : 60);
                let cE = score >= 7500 ? treeImg : (score >= 5000 ? semiTreeImg : plantImg);
                if (cE.complete) ctx.drawImage(cE, CENTER.x-(sS/2), CENTER.y-(sS/2), sS, sS);
                ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 14; ctx.beginPath(); ctx.arc(CENTER.x, CENTER.y, 105, shieldAngle - 0.75, shieldAngle + 0.75); ctx.stroke();
                lumberjacks.forEach(lj => {
                    const lx = CENTER.x+Math.cos(lj.angle)*lj.dist, ly = CENTER.y+Math.sin(lj.angle)*lj.dist;
                    if (lumberjackImg.complete) { ctx.save(); ctx.translate(lx, ly); ctx.rotate(lj.angle + Math.PI/2); ctx.drawImage(lumberjackImg, -40, -40, 80, 80); ctx.restore(); }
                });
                ctx.fillStyle="white"; ctx.font="bold 26px monospace"; ctx.textAlign="center";
                ctx.fillText(`SCORE: ${score}/10000 | HP: ${seedHP} | TIME: ${timeLeft}`, WIDTH/2, 50);
                ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(joystick.baseX, joystick.baseY, joystick.radius, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle="rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(joystick.currX, joystick.currY, 40, 0, Math.PI*2); ctx.fill();
                if (currentQ) drawQuizUI_Shared();
            } else if (currentScene === 'STAGE3') {
                if (stunTimer > 0) stunTimer -= dt; if (fishHiddenTimer > 0) fishHiddenTimer -= dt;
                if (!gameOver && !gameWon && !currentQ && !isSettingsOpen) {
                    quizTimer += dt; if (quizTimer >= 10 && activeQuestions.length > 0) { currentQ = activeQuestions.shift(); quizTimer = 0; }
                    bgTimer += dt; if (bgTimer >= 0.15) { bgTimer = 0; currentFrame = (currentFrame + 1) % 3; }
                    if (hookState === "extend") { hookLength += 850 * dt; if (hookLength > 265) hookState = "return"; } 
                    else if (hookState === "return") { hookLength -= 650 * dt; if (hookLength <= 0) { hookLength = 0; hookState = "idle"; } }
                    const tipX = S3_W/2, tipY = 265 - hookLength;
                    if (fishHiddenTimer <= 0) {
                        s3Fish.forEach(f => {
                            f.x += f.speed; if (f.x < -100 || f.x > S3_W+100) f.speed *= -1;
                            if (hookState === "extend" && Math.hypot(tipX-(f.x+37), tipY-(f.y+22)) < 28) { hookState = "return"; stunTimer = 1.0; }
                        });
                    }
                    s3Trash.forEach((t, i) => {
                        t.x += t.speed; if (t.x < 0 || t.x > S3_W-55) t.speed *= -1;
                        if (hookState === "extend" && Math.hypot(tipX-(t.x+27), tipY-(t.y+27)) < 30) { score += 500; s3Trash.splice(i, 1); hookState = "return"; if (score >= 15000) gameWon = true; }
                    });
                }
                ctx.save(); ctx.scale(3.2, 2.4); if (s3Bgs[currentFrame]) ctx.drawImage(s3Bgs[currentFrame], 0, 0, S3_W, S3_H);
                ctx.strokeStyle = stunTimer > 0 ? "red" : (fishHiddenTimer > 0 ? "#00ff00" : "white");
                ctx.beginPath(); ctx.moveTo(S3_W/2, 265); ctx.lineTo(S3_W/2, 265-hookLength); ctx.stroke();
                if (fishHiddenTimer <= 0) s3Fish.forEach(f => { ctx.save(); ctx.translate(f.x+(f.speed<0?75:0), f.y); if(f.speed<0) ctx.scale(-1,1); if(fishImg.complete) ctx.drawImage(fishImg, 0, 0, 75, 45); ctx.restore(); });
                s3Trash.forEach(t => { if(trashSprites[t.spriteIdx].complete) ctx.drawImage(trashSprites[t.spriteIdx], t.x, t.y, 55, 55); });
                if (boatImg.complete) ctx.drawImage(boatImg, S3_W/2-70, 245, 140, 70); ctx.restore();
                ctx.fillStyle = "white"; ctx.font = "bold 28px monospace"; ctx.textAlign = "center";
                ctx.fillText(`SCORE: ${score} / 15000`, WIDTH/2, 50);
                if (currentQ) drawQuizUI_Shared();
            } else if (currentScene === 'STAGE4') {
                if (!gameOver && !gameWon && !isSettingsOpen) {
                    if (!currentQ) {
                        bossTimer -= dt; spawnCooldown -= dt; quizTimer += dt;
                        if (quizTimer >= 15 && activeQuestions.length > 0) { currentQ = activeQuestions.shift(); quizTimer = 0; }
                        if (bossTimer <= 0) initStage5();
                        if (spawnCooldown <= 0) { dynamites.push({ x: WIDTH, bIdx: Math.random() < 0.5 ? 0 : 1, speed: 12, warning: 0.5 }); spawnCooldown = 1.6; }
                        dynamites.forEach((d, i) => {
                            if (d.warning > 0) d.warning -= dt; else d.x -= d.speed;
                            if (d.x < 280 && d.x > 140 && (playerLane === d.bIdx || playerLane === d.bIdx + 1)) { if (!invincible) health -= 20; explosions.push({ x: d.x, y: s4Borders[d.bIdx], life: 0.6 }); dynamites.splice(i, 1); } 
                            else if (d.x < -20) { explosions.push({ x: 0, y: s4Borders[d.bIdx], life: 0.6 }); dynamites.splice(i, 1); }
                        });
                    }
                    explosions.forEach((e, i) => { e.life -= dt; if (e.life <= 0) explosions.splice(i, 1); });
                    if (health <= 0) gameOver = true;
                }
                if (riverBg.complete) ctx.drawImage(riverBg, 0, 0, WIDTH, HEIGHT);
                ctx.drawImage(shipImg, WIDTH - 550, 180 + wavy, 600, 350); ctx.drawImage(boatGuyImg, 130, s4LanesY[playerLane] - 90 + wavy, 180, 180);
                dynamites.forEach(d => { if(tntImg.complete) ctx.drawImage(tntImg, d.x - 30, s4Borders[d.bIdx] - 30, 60, 60); });
                explosions.forEach(e => { if (explodeImg.complete) { ctx.save(); ctx.globalAlpha = Math.min(1, e.life*1.5); ctx.drawImage(explodeImg, e.x-300, e.y-300, 600, 600); ctx.restore(); } });
                ctx.fillStyle = "#333"; ctx.fillRect(50, 20, 300, 25);
                ctx.fillStyle = "#2ed573"; ctx.fillRect(50, 20, 300 * (health / 100), 25);
                ctx.fillStyle = "white"; ctx.font = "bold 24px monospace"; ctx.textAlign="left";
                ctx.fillText(`REACH SHIP: ${Math.ceil(bossTimer)}s | HP: ${health}`, 50, 80);
                if (currentQ) drawQuizUI_Shared();
            } else if (currentScene === 'STAGE5') {
                if (!gameOver && !gameWon) {
                    if (!waitingForQuiz && turnQueue > 0 && fireballs.length === 0 && warnings.length === 0) {
                        let lns = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
                        [lns[0], lns[1]].forEach(lane => {
                            warnings.push({ lane, timer: 1.2 });
                            setTimeout(() => { if (currentScene === 'STAGE5') fireballs.push({ lane, y: 150, speed: 14 }); }, 1200);
                        });
                        turnQueue--;
                    } else if (!waitingForQuiz && turnQueue === 0 && fireballs.length === 0 && warnings.length === 0) {
                        waitingForQuiz = true; currentQ = activeQuestions.length > 0 ? activeQuestions.shift() : questionsBank[Math.floor(Math.random()*questionsBank.length)];
                    }
                    fireballs.forEach((f, i) => { f.y += f.speed; if (f.y > HEIGHT - 120) { if (playerLane === f.lane && !invincible) health -= 20; explosions.push({ x: s5LanesX[f.lane], y: HEIGHT - 100, life: 0.6 }); fireballs.splice(i, 1); } });
                    warnings.forEach((w, i) => { w.timer -= dt; if (w.timer <= 0) warnings.splice(i, 1); });
                    explosions.forEach((e, i) => { e.life -= dt; if (e.life <= 0) explosions.splice(i, 1); });
                    if (health <= 0) gameOver = true; if (bossHP <= 0) { bossHP = 0; gameWon = true; }
                }
                if (backunawaImg.complete) ctx.drawImage(backunawaImg, 0, 0, WIDTH, HEIGHT);
                ctx.drawImage(boatkunawaImg, WIDTH/2 - 400, 20 + wavy, 800, 500);
                fireballs.forEach(f => { if (payrImg.complete) ctx.drawImage(payrImg, s5LanesX[f.lane] - 60, f.y - 60, 120, 120); });
                ctx.drawImage(boatGuyImg, s5LanesX[playerLane]-90, HEIGHT-200+wavy, 180, 180);
                ctx.fillStyle = "white"; ctx.font = "bold 28px monospace"; ctx.textAlign = "center";
                ctx.fillText(`BAKUNAWA HP: ${bossHP}% | HEALTH: ${health}`, WIDTH/2, 50);
                if (waitingForQuiz && currentQ) drawQuizUI_Shared();
            }

            if (butoImg.complete && !isEnteringName && currentScene !== 'LOADING' && currentScene !== 'JOURNAL' && !currentScene.includes('CUTSCENE')) {
                ctx.drawImage(butoImg, setBtnRect.x, setBtnRect.y, setBtnRect.w, setBtnRect.h);
            }

            if (currentScene !== 'MAP' && currentScene !== 'JOURNAL' && !currentScene.includes('CUTSCENE') && (gameOver || gameWon)) {
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.font = "bold 70px monospace";
                ctx.fillText(gameWon ? "STAGE CLEAR" : "DEFEATED", WIDTH/2, HEIGHT/2 - 20);
                ctx.fillStyle = "#1a441a"; ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
                ctx.fillStyle = "white"; ctx.font = "bold 24px monospace"; ctx.fillText(gameWon ? "STAGE MAP" : "TRY AGAIN", WIDTH/2, btn.y + 35);
            }

            if (isSettingsOpen) {
                ctx.fillStyle = "rgba(0,0,0,0.95)"; ctx.fillRect(0,0,WIDTH,HEIGHT);
                ctx.fillStyle = "white"; ctx.font = "bold 50px monospace"; ctx.textAlign = "center";
                ctx.fillText("PAUSED", WIDTH/2, 120);
                const menuItems = ["CONTINUE", "JOURNAL", "INSERT CODE"];
                if (currentScene.includes('STAGE')) { menuItems.push("RESTART", "RETURN TO MAP"); }
                menuItems.forEach((label, i) => {
                    ctx.fillStyle = "#333"; ctx.fillRect(WIDTH/2-150, 180 + i*60, 300, 50);
                    ctx.fillStyle = label === "INSERT CODE" ? "#2ed573" : "white"; ctx.font = "20px monospace";
                    ctx.fillText(label, WIDTH/2, 212 + i*60);
                });
            }
            requestAnimationFrame(gameLoop);
        }

        function drawQuizUI_S1() {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(50, 50, V_WIDTH - 100, V_HEIGHT - 100);
            ctx.fillStyle = "white"; ctx.font = "14px monospace"; ctx.textAlign = "center"; ctx.fillText(currentQ.q, V_WIDTH/2, 90);
            currentQ.a.forEach((ans, i) => {
                ctx.fillStyle = "#2f3542"; ctx.fillRect(140, 130 + i*40, V_WIDTH-280, 30);
                ctx.fillStyle = "white"; ctx.fillText(ans, V_WIDTH/2, 150 + i*40);
            });
        }
        function drawQuizUI_Shared() {
            ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = "white"; ctx.font = "bold 28px monospace"; ctx.textAlign = "center"; ctx.fillText(currentQ.q, WIDTH/2, HEIGHT/2 - 100);
            currentQ.a.forEach((ans, i) => {
                ctx.fillStyle = "#2f3542"; ctx.fillRect(WIDTH/2 - 150, (HEIGHT/2 - 100) + 80 + i*45, 300, 35);
                ctx.fillStyle = "white"; ctx.font = "18px monospace"; ctx.fillText(ans, WIDTH/2, (HEIGHT/2 - 100) + 103 + i*45);
            });
        }

        canvas.addEventListener('mousedown', e => handleInput(e.clientX, e.clientY, true));
        canvas.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY, false));
        window.addEventListener('mouseup', () => handleInput(0, 0, false, true));
        canvas.addEventListener('touchstart', e => { handleInput(e.touches[0].clientX, e.touches[0].clientY, true); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchmove', e => { handleInput(e.touches[0].clientX, e.touches[0].clientY, false); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchend', () => handleInput(0, 0, false, true));
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
